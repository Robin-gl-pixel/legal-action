@section fondement
Aux termes de l'article L224-33 du code de la consommation, le consommateur peut, apres la premiere annee d'execution d'un contrat de services de communications electroniques souscrit pour une duree determinee, resilier ce contrat a tout moment, par tout moyen, sans penalite et sans motif.

L'article L121-84-2 du code de la consommation impose au fournisseur de services de communications electroniques de mettre en oeuvre la resiliation dans un delai maximal de dix jours a compter de la reception de la demande, sauf demande contraire expresse du consommateur, et de restituer le solde crediteur du compte client le cas echeant.

L'article 1217 du code civil rappelle que la partie envers laquelle l'engagement n'a pas ete execute ou l'a ete imparfaitement peut notamment poursuivre l'execution forcee en nature de l'obligation, obtenir une reduction du prix, provoquer la resolution du contrat et demander reparation des consequences de l'inexecution.

L'absence de prise en compte d'une demande de resiliation reguliere, et le maintien des prelevements consecutifs, sont constitutifs d'une inexecution contractuelle au sens des dispositions precitees.

